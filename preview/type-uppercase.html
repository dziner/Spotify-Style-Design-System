<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Uppercase Labels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; gap: 18px; height: 200px; justify-content: center; }
  .lbl { color: var(--text-muted); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
  .upper { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; color: #fff; }
  .upper-wide { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #fff; }
  .badge { font-size: 10.5px; font-weight: 600; text-transform: capitalize; color: var(--text-muted); }
</style></head>
<body>
  <div>
    <div class="lbl">Button label · 14 / 700 / 1.4px</div>
    <div class="upper">Get Premium</div>
  </div>
  <div>
    <div class="lbl">Wide label · 14 / 700 / 2px</div>
    <div class="upper-wide">Follow</div>
  </div>
  <div>
    <div class="lbl">Badge · 10.5 / 600 · capitalize</div>
    <div class="badge">New release</div>
  </div>
</body></html>
