<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px 26px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px 16px; align-items: center; justify-items: center; }
  .icon { width: 28px; height: 28px; color: #fff; }
  .icon.muted { color: #b3b3b3; }
  .icon.green { color: #1ed760; }
  .label { font-size: 10px; color: #b3b3b3; text-align: center; margin-top: 4px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .head { font-size: 11px; color: #b3b3b3; text-transform: uppercase; letter-spacing: 1.4px; font-weight: 700; margin-bottom: 12px; }
</style></head>
<body>
  <div class="head">Lucide substitution · 24px nominal</div>
  <div class="grid">
    <div class="col"><img class="icon" src="../assets/icons/home.svg"><div class="label">home</div></div>
    <div class="col"><img class="icon" src="../assets/icons/search.svg"><div class="label">search</div></div>
    <div class="col"><img class="icon" src="../assets/icons/library.svg"><div class="label">library</div></div>
    <div class="col"><img class="icon" src="../assets/icons/play.svg"><div class="label">play</div></div>
    <div class="col"><img class="icon" src="../assets/icons/pause.svg"><div class="label">pause</div></div>
    <div class="col"><img class="icon" src="../assets/icons/next.svg"><div class="label">next</div></div>
    <div class="col"><img class="icon" src="../assets/icons/prev.svg"><div class="label">prev</div></div>
    <div class="col"><img class="icon" src="../assets/icons/shuffle.svg"><div class="label">shuffle</div></div>
    <div class="col"><img class="icon" src="../assets/icons/repeat.svg"><div class="label">repeat</div></div>
    <div class="col"><img class="icon green" src="../assets/icons/heart-filled.svg"><div class="label">heart</div></div>
    <div class="col"><img class="icon" src="../assets/icons/plus.svg"><div class="label">plus</div></div>
    <div class="col"><img class="icon muted" src="../assets/icons/ellipsis.svg"><div class="label">more</div></div>
    <div class="col"><img class="icon" src="../assets/icons/volume.svg"><div class="label">volume</div></div>
    <div class="col"><img class="icon" src="../assets/icons/queue.svg"><div class="label">queue</div></div>
    <div class="col"><img class="icon" src="../assets/icons/podcast.svg"><div class="label">podcast</div></div>
    <div class="col"><img class="icon muted" src="../assets/icons/user.svg"><div class="label">user</div></div>
  </div>
</body></html>
