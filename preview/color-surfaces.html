<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .swatch { aspect-ratio: 1.4 / 1; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
  .swatch.bordered { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06); }
  .name { font-size: 12px; font-weight: 700; }
  .hex { font-size: 11px; color: var(--text-muted); font-feature-settings: "tnum"; letter-spacing: 0.02em; margin-top: 2px; }
</style></head>
<body>
  <div class="grid">
    <div class="swatch bordered" style="background:#121212"><div class="name">Base</div><div class="hex">#121212</div></div>
    <div class="swatch bordered" style="background:#181818"><div class="name">Surface</div><div class="hex">#181818</div></div>
    <div class="swatch" style="background:#1f1f1f"><div class="name">Elevated</div><div class="hex">#1f1f1f</div></div>
    <div class="swatch" style="background:#252525"><div class="name">Card</div><div class="hex">#252525</div></div>
    <div class="swatch" style="background:#282828"><div class="name">Hover</div><div class="hex">#282828</div></div>
  </div>
</body></html>
