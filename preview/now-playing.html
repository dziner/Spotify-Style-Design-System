<!doctype html>
<html><head><meta charset="utf-8"><title>Now Playing Bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; height: 90px; background: #000; display: flex; align-items: center; }
  .bar { width: 100%; height: 72px; background: #000; padding: 0 16px; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 16px; align-items: center; }
  /* left */
  .nowplay { display: flex; align-items: center; gap: 12px; }
  .cover { width: 56px; height: 56px; border-radius: 4px; background: linear-gradient(135deg, #f3727f, #ffa42b); flex-shrink: 0; }
  .meta { min-width: 0; }
  .ttl { font-size: 14px; font-weight: 600; line-height: 1.2; }
  .art { font-size: 11px; color: #b3b3b3; margin-top: 2px; }
  .heart { color: #1ed760; }
  /* center */
  .center { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .controls { display: flex; gap: 16px; align-items: center; }
  .icon { width: 16px; height: 16px; color: #b3b3b3; cursor: pointer; }
  .icon.act { color: #1ed760; }
  .play { width: 32px; height: 32px; border-radius: 50%; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; }
  .play svg { width: 14px; height: 14px; transform: translateX(1px); }
  .scrub { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 480px; }
  .scrub .t { font-size: 11px; color: #b3b3b3; font-feature-settings: "tnum"; min-width: 32px; }
  .scrub .track { flex: 1; height: 4px; background: rgba(255,255,255,.3); border-radius: 2px; overflow: hidden; position: relative; }
  .scrub .fill { background: #fff; height: 100%; width: 35%; border-radius: 2px; }
  /* right */
  .right { display: flex; gap: 12px; align-items: center; justify-content: flex-end; }
  .vol { display: flex; align-items: center; gap: 8px; }
  .vol .bar2 { width: 90px; height: 4px; background: rgba(255,255,255,.3); border-radius: 2px; }
  .vol .vfill { width: 60%; height: 100%; background: #fff; border-radius: 2px; }
</style></head>
<body>
  <div class="bar">
    <div class="nowplay">
      <div class="cover"></div>
      <div class="meta">
        <div class="ttl">Punisher</div>
        <div class="art">Phoebe Bridgers</div>
      </div>
      <svg class="icon heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.5-9.5-9.1C.6 8.1 2.7 4 6.5 4c2 0 3.6 1 5.5 3 1.9-2 3.5-3 5.5-3 3.8 0 5.9 4.1 4 7.9C19 16.5 12 21 12 21z"/></svg>
    </div>
    <div class="center">
      <div class="controls">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M21 3 14 10M8 21H3v-5m0 5 7-7M3 8V3h5m13 13 .01 5H16m1-7 4 7"/></svg>
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 4.5a1 1 0 0 0-1.55-.83l-12 7.5a1 1 0 0 0 0 1.66l12 7.5A1 1 0 0 0 19 19.5v-15z"/></svg>
        <div class="play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.05 3.606 19.93 11.07a1.071 1.071 0 0 1 0 1.86L7.05 20.394A1.071 1.071 0 0 1 5.5 19.464V4.536A1.071 1.071 0 0 1 7.05 3.606z"/></svg></div>
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4.5a1 1 0 0 1 1.55-.83l12 7.5a1 1 0 0 1 0 1.66l-12 7.5A1 1 0 0 1 5 19.5v-15z"/></svg>
        <svg class="icon act" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m17 2 4 4-4 4M3 11v-1a4 4 0 0 1 4-4h14m-14 16-4-4 4-4m14-1v1a4 4 0 0 1-4 4H3"/></svg>
      </div>
      <div class="scrub">
        <span class="t">1:23</span>
        <div class="track"><div class="fill"></div></div>
        <span class="t">3:59</span>
      </div>
    </div>
    <div class="right">
      <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.06A4.5 4.5 0 0 0 16.5 12z"/></svg>
      <div class="vol"><div class="bar2"><div class="vfill"></div></div></div>
    </div>
  </div>
</body></html>
