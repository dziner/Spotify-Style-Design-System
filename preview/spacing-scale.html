<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing — 8px scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 28px; }
  .row { display: grid; grid-template-columns: 80px 1fr 50px; gap: 16px; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
  .row:last-child { border-bottom: 0; }
  .lbl { font-size: 12px; font-weight: 700; color: var(--text-muted); font-feature-settings: "tnum"; }
  .bar { height: 8px; background: #1ed760; border-radius: 4px; }
  .px { font-size: 11px; color: var(--text-subdued); text-align: right; font-feature-settings: "tnum"; }
</style></head>
<body>
  <div class="row"><div class="lbl">sp-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="lbl">sp-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="lbl">sp-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="lbl">sp-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="lbl">sp-5</div><div class="bar" style="width:20px"></div><div class="px">20px</div></div>
  <div class="row"><div class="lbl">sp-6</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="lbl">sp-8</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="lbl">sp-12</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="lbl">sp-16</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
</body></html>
