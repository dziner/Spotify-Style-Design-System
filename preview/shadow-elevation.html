<!doctype html>
<html><head><meta charset="utf-8"><title>Shadow / Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 30px 28px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; background: #0a0a0a; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .demo { width: 150px; height: 110px; background: #181818; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .demo .glyph { width: 36px; height: 36px; background: #1ed760; border-radius: 50%; }
  .lvl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; color: var(--text-muted); }
  .nm { font-size: 13px; font-weight: 700; }
  .code { font-size: 10px; color: var(--text-subdued); font-family: ui-monospace, Menlo, monospace; text-align: center; }
</style></head>
<body>
  <div class="item">
    <div class="demo" style="box-shadow: rgba(0,0,0,.3) 0 8px 8px;"><div class="glyph"></div></div>
    <div class="lvl">Level 2</div>
    <div class="nm">Card</div>
    <div class="code">rgba(0,0,0,.3) 0 8px 8px</div>
  </div>
  <div class="item">
    <div class="demo" style="box-shadow: rgba(0,0,0,.5) 0 8px 24px;"><div class="glyph"></div></div>
    <div class="lvl">Level 3</div>
    <div class="nm">Dialog</div>
    <div class="code">rgba(0,0,0,.5) 0 8px 24px</div>
  </div>
  <div class="item">
    <div class="demo" style="box-shadow: 0 1px 0 #121212, 0 0 0 1px #7c7c7c inset;"><div class="glyph"></div></div>
    <div class="lvl">Inset</div>
    <div class="nm">Input</div>
    <div class="code">inset 1px #7C7C7C</div>
  </div>
</body></html>
