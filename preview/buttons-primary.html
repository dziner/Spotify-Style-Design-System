<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 30px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px 36px; align-items: center; }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
  .lbl { color: var(--text-muted); font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase; font-weight: 700; }
  .green-cta {
    background: #1ed760; color: #000;
    padding: 14px 36px; border-radius: 500px; border: 0;
    font-family: var(--font-ui); font-size: 14px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.4px; cursor: pointer;
  }
  .dark-pill {
    background: #1f1f1f; color: #fff;
    padding: 10px 18px; border-radius: 9999px; border: 0;
    font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  }
  .play-circle {
    width: 48px; height: 48px; border-radius: 50%;
    background: #1ed760; color: #000; border: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: rgba(0,0,0,.3) 0 8px 8px;
    cursor: pointer;
  }
  .play-circle svg { width: 22px; height: 22px; transform: translateX(1px); }
  .light-pill {
    background: #eeeeee; color: #181818;
    padding: 10px 24px; border-radius: 500px; border: 0;
    font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  }
</style></head>
<body>
  <div class="item">
    <div class="lbl">Green CTA</div>
    <button class="green-cta">Get Premium</button>
  </div>
  <div class="item">
    <div class="lbl">Play Circle · 50%</div>
    <button class="play-circle"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.05 3.606 19.93 11.07a1.071 1.071 0 0 1 0 1.86L7.05 20.394A1.071 1.071 0 0 1 5.5 19.464V4.536A1.071 1.071 0 0 1 7.05 3.606z"/></svg></button>
  </div>
  <div class="item">
    <div class="lbl">Dark Pill · 9999px</div>
    <button class="dark-pill">Music</button>
  </div>
  <div class="item">
    <div class="lbl">Light Pill · 500px</div>
    <button class="light-pill">Sign up free</button>
  </div>
</body></html>
