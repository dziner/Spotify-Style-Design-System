<!doctype html>
<html><head><meta charset="utf-8"><title>Radius — scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px 24px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .shape { width: 80px; height: 80px; background: #1f1f1f; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06); position: relative; overflow: hidden; }
  .shape::after { content: ""; position: absolute; inset: 4px; border: 1px dashed rgba(30, 215, 96, 0.5); border-radius: inherit; }
  .nm { font-size: 11px; font-weight: 700; color: #fff; }
  .px { font-size: 10px; color: var(--text-muted); font-feature-settings: "tnum"; }
</style></head>
<body>
  <div class="item"><div class="shape" style="border-radius:2px"></div><div class="nm">Badge</div><div class="px">2px</div></div>
  <div class="item"><div class="shape" style="border-radius:4px"></div><div class="nm">Sm</div><div class="px">4px</div></div>
  <div class="item"><div class="shape" style="border-radius:6px"></div><div class="nm">Card</div><div class="px">6px</div></div>
  <div class="item"><div class="shape" style="border-radius:8px"></div><div class="nm">Md</div><div class="px">8px</div></div>
  <div class="item"><div class="shape" style="border-radius:10px"></div><div class="nm">Lg</div><div class="px">10px</div></div>
  <div class="item"><div class="shape" style="border-radius:20px"></div><div class="nm">XL</div><div class="px">20px</div></div>
  <div class="item"><div class="shape" style="border-radius:100px"></div><div class="nm">Large Pill</div><div class="px">100px</div></div>
  <div class="item"><div class="shape" style="border-radius:500px"></div><div class="nm">Pill</div><div class="px">500px</div></div>
  <div class="item"><div class="shape" style="border-radius:9999px"></div><div class="nm">Full Pill</div><div class="px">9999px</div></div>
  <div class="item"><div class="shape" style="border-radius:50%"></div><div class="nm">Circle</div><div class="px">50%</div></div>
</body></html>
