<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Border / Divider</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
  .demo { display: grid; grid-template-columns: 220px 1fr 100px; gap: 16px; align-items: center; }
  .name { font-size: 13px; font-weight: 700; }
  .role { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .hex { font-size: 11px; color: var(--text-subdued); text-align: right; font-feature-settings: "tnum"; }
  .pill-default { display:inline-block; padding: 8px 18px; border-radius:9999px; border: 1px solid #4d4d4d; color:#fff; font-size:13px; font-weight:700; }
  .pill-strong { display:inline-block; padding: 8px 18px; border-radius:9999px; border: 1px solid #7c7c7c; color:#fff; font-size:13px; font-weight:700; }
  .divider-row { display:flex; gap:14px; align-items:center; font-size:13px; }
  .divider-row > .line { flex: 1; height: 1px; background: rgba(255,255,255,0.10); }
  .input { background: #1f1f1f; color:#fff; padding: 8px 14px; border-radius: 500px; border: 0; box-shadow: 0 1px 0 rgb(18,18,18), 0 0 0 1px rgb(124,124,124) inset; font-size: 13px; }
</style></head>
<body>
  <div class="demo">
    <div><span class="pill-default">Follow</span></div>
    <div><div class="name">Default border</div><div class="role">muted dark borders</div></div>
    <div class="hex">#4D4D4D</div>
  </div>
  <div class="demo">
    <div><span class="pill-strong">Follow</span></div>
    <div><div class="name">Strong border</div><div class="role">outlined buttons</div></div>
    <div class="hex">#7C7C7C</div>
  </div>
  <div class="demo">
    <div class="divider-row"><span>Liked</span><span class="line"></span><span>Mixes</span></div>
    <div><div class="name">Separator</div><div class="role">list dividers</div></div>
    <div class="hex">rgba(255,255,255,.10)</div>
  </div>
  <div class="demo">
    <div><input class="input" placeholder="Search"></div>
    <div><div class="name">Inset border-shadow</div><div class="role">inputs, recessed surfaces</div></div>
    <div class="hex">inset #7C7C7C</div>
  </div>
</body></html>
