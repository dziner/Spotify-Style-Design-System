<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spotify Web Player — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="kit.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="Card.jsx"></script>
<script type="text/babel" src="TrackRow.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="BrowseHome.jsx"></script>
<script type="text/babel" src="PlaylistView.jsx"></script>
<script type="text/babel" src="NowPlaying.jsx"></script>

<script type="text/babel">
const { useState } = React;

function App() {
  const { PLAYLISTS, LIB, GREETING, SECTIONS } = window.DEMO_DATA;
  const [view, setView] = useState('home');         // 'home' | 'search' | 'playlist'
  const [playlistId, setPlaylistId] = useState(null);
  const [query, setQuery] = useState('');
  const [history, setHistory] = useState(['home']);
  const [hIndex, setHIndex] = useState(0);
  const [currentTrack, setCurrentTrack] = useState(PLAYLISTS.liked.tracks[0]);
  const [isPlaying, setIsPlaying] = useState(true);
  const [shuffle, setShuffle] = useState(false);
  const [repeat, setRepeat] = useState(false);

  function navigate(v, id) {
    setView(v);
    if (v === 'playlist') setPlaylistId(id);
    const next = history.slice(0, hIndex + 1).concat([v + (id ? ':' + id : '')]);
    setHistory(next);
    setHIndex(next.length - 1);
  }
  function back() {
    if (hIndex === 0) return;
    const newIdx = hIndex - 1;
    const target = history[newIdx];
    setHIndex(newIdx);
    const [v, id] = target.split(':');
    setView(v);
    if (v === 'playlist') setPlaylistId(id);
  }
  function forward() {
    if (hIndex >= history.length - 1) return;
    const newIdx = hIndex + 1;
    const target = history[newIdx];
    setHIndex(newIdx);
    const [v, id] = target.split(':');
    setView(v);
    if (v === 'playlist') setPlaylistId(id);
  }

  function playFrom(track, index) {
    setCurrentTrack(track);
    setIsPlaying(true);
  }
  function playPlaylist(id) {
    const pl = PLAYLISTS[id] || PLAYLISTS.liked;
    setCurrentTrack(pl.tracks[0]);
    setIsPlaying(true);
    navigate('playlist', id);
  }

  const currentPlaylist = playlistId && PLAYLISTS[playlistId];

  return (
    <>
      <div className="sp-shell">
        <Sidebar
          active={view}
          onNavigate={(v, id) => v === 'playlist' ? navigate('playlist', id) : navigate(v)}
          playlists={LIB}
          currentPlaylist={view === 'playlist' ? playlistId : null}
        />
        <main className="sp-main">
          <TopBar onBack={back} onForward={forward} view={view} query={query} onQueryChange={setQuery} />
          <div className="sp-content">
            {view === 'home' && (
              <BrowseHome
                greetingItems={GREETING}
                sections={SECTIONS}
                onPlay={(item) => playPlaylist(item.id)}
                onOpenPlaylist={(id) => navigate('playlist', id)}
              />
            )}
            {view === 'search' && (
              <BrowseHome
                greetingItems={GREETING.filter(g => !query || g.name.toLowerCase().includes(query.toLowerCase()))}
                sections={SECTIONS}
                onPlay={(item) => playPlaylist(item.id)}
                onOpenPlaylist={(id) => navigate('playlist', id)}
              />
            )}
            {view === 'playlist' && currentPlaylist && (
              <PlaylistView
                playlist={currentPlaylist}
                currentTrack={currentTrack?.id}
                isPlaying={isPlaying}
                onPlay={playFrom}
                onPlayAll={() => { setCurrentTrack(currentPlaylist.tracks[0]); setIsPlaying(p => !p); }}
              />
            )}
          </div>
        </main>
      </div>
      <NowPlaying
        track={currentTrack}
        isPlaying={isPlaying}
        onToggle={() => setIsPlaying(p => !p)}
        onNext={() => {}}
        onPrev={() => {}}
        shuffle={shuffle} repeat={repeat}
        onShuffle={() => setShuffle(s => !s)}
        onRepeat={() => setRepeat(r => !r)}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
