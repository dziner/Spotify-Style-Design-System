<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spotify Marketing — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="kit.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="../web-player/Icons.jsx"></script>
<script type="text/babel" src="MarketingNav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="PlanCard.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
function App() {
  const plans = [
    { name: 'Free', price: 0, period: 'month', features: ['Shuffle play', 'Ad-supported', 'Limited skips'], cta: 'Sign up free' },
    { name: 'Individual', price: '11.99', period: 'month', features: ['Ad-free music', 'Download to listen offline', 'Play songs in any order', 'High audio quality'], cta: 'Try free for 1 month', featured: true },
    { name: 'Duo', price: '15.99', period: 'month', features: ['2 Premium accounts', 'Duo Mix playlist', 'Ad-free music', 'Offline listening'], cta: 'Try free for 1 month' },
    { name: 'Family', price: '18.99', period: 'month', features: ['Up to 6 Premium accounts', 'Block explicit music', 'Spotify Kids app', 'Family Mix playlist'], cta: 'Try free for 1 month' },
  ];

  return (
    <>
      <div className="mk-page">
        <MarketingNav />
        <Hero />
        <section className="mk-plans">
          <h2 className="mk-plans-title">Pick the plan that fits.</h2>
          <p className="mk-plans-sub">Listen to the music and podcasts you love, without limits.</p>
          <div className="mk-plans-grid">
            {plans.map(p => <PlanCard key={p.name} {...p} />)}
          </div>
        </section>
      </div>
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
